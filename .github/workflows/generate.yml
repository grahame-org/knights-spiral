name: Generate Knight's Spiral

on:
  pull_request:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Generate single-colour image
        run: knights-spiral 1000 -o knights_spiral_1000.png

      - name: Upload single-colour image
        uses: actions/upload-artifact@v4
        with:
          name: knights-spiral-1000
          path: knights_spiral_1000.png

      - name: Generate 2-colour image
        run: knights-spiral 1000 -c 2 -o knights_spiral_1000_2colours.png

      - name: Upload 2-colour image
        uses: actions/upload-artifact@v4
        with:
          name: knights-spiral-1000-2colours
          path: knights_spiral_1000_2colours.png
